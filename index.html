<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Invoice & penawaran profesional, tanpa ribet" />
    <meta name="theme-color" content="#0F0F0F" />
    <title>InvoiceGua</title>
    <script>
      // Set tema SEBELUM apapun dirender — cegah flash tema salah (FOUC)
      // sekaligus bikin splash screen di bawah ikut tema yang benar.
      try {
        var theme = localStorage.getItem('theme')
        if (theme === 'dark') document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
    <style>
      /* Splash screen murni HTML/CSS — render sebelum React sempat mount.
         initDB() di main.tsx itu async (buka IndexedDB, seed data), jadi ada
         gap waktu sebelum React app ada isinya. Tanpa ini, gap itu blank putih polos. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #F9FAFB;
        z-index: 9999;
        transition: opacity 0.25s ease-out;
      }
      html.dark #splash {
        background: #0A0A0A;
      }
      #splash.splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-word {
        font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #0F0F0F;
      }
      html.dark #splash-word {
        color: #F9FAFB;
      }
      #splash-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 14px;
      }
      #splash-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #9CA3AF;
        animation: splash-dot-pulse 1.1s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-dot-pulse {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.7); }
        40% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash-dots span { animation: none; opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true">
      <span id="splash-word">InvoiceGua</span>
      <span id="splash-dots"><span></span><span></span><span></span></span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
